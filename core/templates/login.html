<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #c49b63;
            --primary-dark: #a17a45;
            --secondary: #5a4a3a;
            --accent: #e67e22;
            --dark: #2c3e50;
            --light: #fef9e7;
            --gold: #d4af37;
            --warm-bg: #faf3e0;
            --text-dark: #3a2e2a;
            --text-soft: #5d4e46;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #2c3e50, #5a4a3a);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
        }

        body::before {
            width: 340px;
            height: 340px;
            background: var(--primary);
            top: -80px;
            right: -80px;
            opacity: 0.3;
        }

        body::after {
            width: 280px;
            height: 280px;
            background: var(--gold);
            bottom: -60px;
            left: -60px;
            opacity: 0.3;
        }

        .auth-card {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
            position: relative;
            z-index: 1;
            animation: fadeUp 0.45s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--primary), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .brand-subtitle {
            color: var(--text-soft);
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .form-label {
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-label i {
            color: var(--primary);
            font-size: 1rem;
        }

        .form-control {
            border-radius: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            padding: 14px 18px;
            font-size: 1rem;
            transition: all 0.3s;
            width: 100%;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 0.2rem rgba(196, 155, 99, 0.25);
            outline: none;
        }

        .btn-auth {
            background: linear-gradient(135deg, var(--primary), var(--gold));
            border: 0;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            padding: 16px;
            font-size: 1.1rem;
            transition: all 0.3s;
            width: 100%;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-auth:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(196, 155, 99, 0.3);
            color: white;
        }

        .auth-links {
            color: var(--text-soft);
            font-size: 1rem;
            margin-top: 25px;
        }

        .auth-links a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .auth-links a:hover {
            color: var(--gold);
            text-decoration: underline;
        }

        .back-link {
            color: var(--text-soft);
            text-decoration: none;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            transition: all 0.3s;
        }

        .back-link:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }

        .alert {
            border-radius: 12px;
            font-size: 0.95rem;
            padding: 15px;
            margin-bottom: 25px;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-danger {
            background: #fff2f0;
            color: #e74c3c;
            border-left: 4px solid #e74c3c;
        }

        .alert-success {
            background: #f0fff4;
            color: #27ae60;
            border-left: 4px solid #27ae60;
        }

        .input-group {
            position: relative;
            width: 100%;
        }

        /* Eliminamos los estilos de icono superpuesto */
        .input-icon {
            display: none;
        }

        .input-with-icon {
            padding-left: 45px;
        }

        /* Responsive */
        @media (max-width: 576px) {
            .auth-card {
                padding: 30px;
                max-width: 100%;
            }
            
            .brand-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <a href="{% url 'carta' %}" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Volver
        </a>
        
        <div class="text-center">
            <h2 class="brand-title">
                <i class="fas fa-crown me-2"></i>Gourmet
            </h2>
            <p class="brand-subtitle">Inicia sesión en tu cuenta</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    <i class="fas fa-info-circle"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        {% if form.errors %}
            <div class="alert alert-danger">
                <i class="fas fa-exclamation-circle"></i>
                Usuario o contraseña incorrectos
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="form-label">
                    <i class="fas fa-user"></i>
                    {{ form.username.label }}
                </label>
                <div class="input-group">
                    {{ form.username }}
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">
                    <i class="fas fa-lock"></i>
                    {{ form.password.label }}
                </label>
                <div class="input-group">
                    {{ form.password }}
                </div>
            </div>

            <button type="submit" class="btn-auth">
                <i class="fas fa-sign-in-alt"></i>
                Entrar
            </button>
        </form>

        <p class="text-center auth-links">
            ¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate</a>
        </p>
    </div>
</body>
</html>
